<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Neon Rush FINAL+</title>
<style>
body{margin:0;overflow:hidden;background:#000;font-family:sans-serif}
canvas{display:block}
#joystick{position:fixed;bottom:30px;left:30px;width:110px;height:110px;border-radius:50%;border:2px solid cyan}
#stick{width:45px;height:45px;background:cyan;border-radius:50%;position:absolute;left:32px;top:32px}
#btnShoot{position:fixed;bottom:40px;right:40px;width:85px;height:85px;border-radius:50%;background:rgba(255,255,0,.2);border:2px solid yellow}
</style>
</head>
<body>

<audio id="bgMusic" loop>
  <source src="https://cdn.pixabay.com/audio/2023/03/28/audio_7b1f3b41e5.mp3" type="audio/mpeg">
</audio>

<canvas id="game"></canvas>
<div id="joystick"><div id="stick"></div></div>
<div id="btnShoot"></div>

<script>
const canvas=document.getElementById('game');
const ctx=canvas.getContext('2d');
const music=document.getElementById('bgMusic');

function resize(){canvas.width=innerWidth;canvas.height=innerHeight}
resize();addEventListener('resize',resize);

let state='menu',level=1,time=0;
let player={x:120,y:300,w:40,h:40,vy:0,jumping:false,hp:10,power:1};
let bullets=[],enemyBullets=[],enemies=[],boss=null;
let shootCooldown=0;

const gravity=.7,groundY=()=>canvas.height-120;

// ===== GUARDADO =====
function saveGame(){
 localStorage.setItem("neon_save", JSON.stringify({
  level:level,
  hp:player.hp,
  power:player.power
 }));
}

function loadGame(){
 let data=localStorage.getItem("neon_save");
 if(data){
  let d=JSON.parse(data);
  level=d.level||1;
  player.hp=d.hp||10;
  player.power=d.power||1;
 }
}

loadGame();

// ===== JOYSTICK =====
let joyX=0;
const stick=document.getElementById('stick');
document.getElementById('joystick').addEventListener('touchmove',e=>{
 let t=e.touches[0]; joyX=(t.clientX-80)/40; stick.style.left=(32+joyX*25)+'px';
});

// ===== DISPARO =====
document.getElementById('btnShoot').addEventListener('touchstart',e=>{
 e.preventDefault();
 if(shootCooldown<=0){
  for(let i=0;i<player.power;i++){
   bullets.push({x:player.x+40,y:player.y+20,vy:(i-1)*2});
  }
  shootCooldown=15;
 }
},{passive:false});

function spawnEnemy(){ if(state==='playing' && !boss){ enemies.push({x:canvas.width,y:groundY(),w:40,h:40,speed:2+level}); }}
setInterval(spawnEnemy,700);

function spawnBoss(){ boss={x:canvas.width-200,y:groundY()-140,w:150,h:150,hp:60+level*10,cool:0}; }

function bg(){ ctx.fillStyle='#000'; ctx.fillRect(0,0,canvas.width,canvas.height); }

function hit(a,b){return a.x<b.x+b.w&&a.x+a.w>b.x&&a.y<b.y+b.h&&a.y+a.h>b.y}

function start(){
 if(state==='menu'){
  state='playing';
  player.y=groundY();
  music.play(); // 🎵 música
 }
}
document.addEventListener('touchstart',start);

function loop(){
 time++; bg();

 if(state==='menu'){
  ctx.fillStyle='#0ff';ctx.font='40px Arial';
  ctx.fillText('TOCA PARA JUGAR',canvas.width/2-120,canvas.height/2);
  return requestAnimationFrame(loop);
 }

 shootCooldown--;

 // guardar automático
 if(time%120===0) saveGame();

 player.x+=joyX*6;
 player.vy+=gravity; player.y+=player.vy;
 if(player.y>groundY()){player.y=groundY();player.vy=0;player.jumping=false}

 if(level%4===0 && !boss){ spawnBoss(); }

 for(let i=bullets.length-1;i>=0;i--){
  let b=bullets[i]; b.x+=14; b.y+=b.vy||0;
  if(b.x>canvas.width) bullets.splice(i,1);
 }

 for(let i=enemies.length-1;i>=0;i--){
  let e=enemies[i]; e.x-=e.speed;

  if(hit(player,e)){ player.hp--; enemies.splice(i,1); continue; }

  for(let j=bullets.length-1;j>=0;j--){
    let b=bullets[j];
    if(hit({x:b.x,y:b.y,w:10,h:5},e)){
      enemies.splice(i,1);
      bullets.splice(j,1);
      break;
    }
  }
 }

 if(boss){
  boss.cool--;

  if(boss.cool<=0){
    for(let i=-2;i<=2;i++){
      enemyBullets.push({x:boss.x,y:boss.y+70,vx:-6,vy:i});
    }
    boss.cool=50;
  }

  ctx.fillStyle='red'; ctx.fillRect(boss.x,boss.y,boss.w,boss.h);

  for(let j=bullets.length-1;j>=0;j--){
    let b=bullets[j];
    if(hit({x:b.x,y:b.y,w:10,h:5},boss)){
      boss.hp--; bullets.splice(j,1);
    }
  }

  if(boss.hp<=0){ boss=null; level++; player.power=Math.min(4,player.power+1); saveGame(); }
 }

 for(let i=enemyBullets.length-1;i>=0;i--){
  let b=enemyBullets[i];
  b.x+=b.vx; b.y+=b.vy||0;
  ctx.fillStyle='orange'; ctx.fillRect(b.x,b.y,8,4);

  if(hit(player,{x:b.x,y:b.y,w:8,h:4})){
    player.hp--; enemyBullets.splice(i,1);
  }
 }

 ctx.fillStyle='#0ff'; ctx.fillRect(player.x,player.y,player.w,player.h);
 ctx.fillStyle='#f0f'; enemies.forEach(e=>ctx.fillRect(e.x,e.y,e.w,e.h));
 ctx.fillStyle='#ff0'; bullets.forEach(b=>ctx.fillRect(b.x,b.y,10,5));

 ctx.fillStyle='#0ff';
 ctx.fillText('HP:'+player.hp,20,30);
 ctx.fillText('Nivel:'+level,20,60);
 ctx.fillText('Power:'+player.power,20,90);

 if(player.hp<=0){
  saveGame();
  ctx.fillStyle='red'; ctx.fillText('GAME OVER',canvas.width/2-100,canvas.height/2);
  return;
 }

 requestAnimationFrame(loop);
}
loop();
</script>
</body>
</html>
